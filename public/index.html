<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PR Command Deck</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand" title="PR Command Deck">
          <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
            <rect width="32" height="32" rx="6" fill="currentColor"/>
            <rect x="7"  y="9"  width="14" height="2" rx="1" fill="var(--paper)"/>
            <rect x="7"  y="15" width="18" height="2" rx="1" fill="var(--red)"/>
            <rect x="7"  y="21" width="11" height="2" rx="1" fill="var(--green)"/>
          </svg>
          <h1 class="brand-name">PR Command Deck</h1>
        </div>

        <section class="controls" aria-label="Dashboard controls">
          <div class="segmented" role="group" aria-label="Scope">
            <button class="segment active" type="button" data-mode="all" aria-pressed="true">All</button>
            <button class="segment" type="button" data-mode="owned" aria-pressed="false">Owned</button>
            <button class="segment" type="button" data-mode="mine" aria-pressed="false">Mine</button>
          </div>
          <label class="switch" title="Include continuous-deployment workflows">
            <input id="includeCd" type="checkbox" checked />
            <span>CD</span>
          </label>
          <label class="switch" title="Include busy self-hosted runners">
            <input id="includeRunners" type="checkbox" />
            <span>Runners</span>
          </label>
          <label class="switch" title="Auto-refresh on an adaptive cadence">
            <input id="autoRefresh" type="checkbox" checked />
            <span>Auto</span>
          </label>
          <label class="switch" title="Automatically merge passing PRs after a server-side 15-second countdown">
            <input id="autoMerge" type="checkbox" />
            <span>Auto merge</span>
          </label>
          <label class="switch" title="Browser notifications when CI/CD work completes">
            <input id="notifications" type="checkbox" checked />
            <span>Notify</span>
          </label>
          <button
            id="inboxToggle"
            class="inbox-toggle"
            type="button"
            aria-haspopup="dialog"
            aria-expanded="false"
            aria-controls="inboxPanel"
            aria-label="Open notification inbox"
            title="Notifications (N)"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 8a6 6 0 0 1 12 0c0 3.5 1 4.8 2 6H4c1-1.2 2-2.5 2-6Z" />
              <path d="M10 18a2 2 0 0 0 4 0" />
            </svg>
            <span id="inboxBadge" class="inbox-badge hidden" aria-hidden="true">0</span>
          </button>
          <button id="refresh" class="refresh" type="button" aria-label="Refresh now" title="Refresh (R)">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12a9 9 0 0 1-15.5 6.2M3 12A9 9 0 0 1 18.5 5.8M18 2v5h-5M6 22v-5h5" />
            </svg>
          </button>
        </section>

        <aside
          id="inboxPanel"
          class="inbox-panel hidden"
          role="dialog"
          aria-modal="false"
          aria-label="Notifications"
          aria-hidden="true"
        >
          <header class="inbox-head">
            <div class="inbox-title">
              <p>Inbox</p>
              <h3 id="inboxHeading">No notifications yet</h3>
            </div>
            <div class="inbox-actions">
              <button id="inboxMarkAll" class="inbox-action" type="button">Mark all read</button>
              <button id="inboxClear" class="inbox-action inbox-action-danger" type="button">Clear</button>
            </div>
          </header>
          <div id="inboxList" class="inbox-list" role="list"></div>
          <p id="inboxEmpty" class="inbox-empty">
            CI &amp; CD completions and new conflicts will appear here.
          </p>
        </aside>
      </header>

      <div class="meta-strip" aria-live="polite">
        <span class="meta-item">
          <span class="meta-label">Signed in</span>
          <strong id="account">&mdash;</strong>
        </span>
        <span class="meta-sep" aria-hidden="true"></span>
        <span class="meta-item">
          <span class="meta-label">Updated</span>
          <strong id="generatedAt">never</strong>
        </span>
        <span class="meta-sep" aria-hidden="true"></span>
        <span class="meta-item">
          <span class="meta-label">Next</span>
          <strong id="nextRefresh">&mdash;</strong>
        </span>
        <span class="meta-sep" aria-hidden="true"></span>
        <span class="meta-item">
          <strong id="rateLimit">Quota: waiting</strong>
        </span>
        <span class="meta-spacer"></span>
        <span class="meta-hint" aria-hidden="true">
          <kbd>/</kbd> filter <kbd>1</kbd>–<kbd>9</kbd>/<kbd>0</kbd> view <kbd>N</kbd> inbox <kbd>R</kbd> refresh
        </span>
      </div>

      <main>
        <section class="scoreboard" aria-label="Summary">
          <button class="metric metric-green" type="button" data-view="pass" aria-label="Show passing CI">
            <span class="metric-label">Passing CI</span>
            <strong id="metricPassing">0</strong>
          </button>
          <button class="metric metric-gray" type="button" data-view="noCi" aria-label="Show ready PRs without CI">
            <span class="metric-label">No CI</span>
            <strong id="metricNoCi">0</strong>
          </button>
          <button class="metric metric-red" type="button" data-view="fail" aria-label="Show failing CI">
            <span class="metric-label">Failing CI</span>
            <strong id="metricFailing">0</strong>
          </button>
          <button class="metric metric-conflict" type="button" data-view="conflicts" aria-label="Show PRs with merge conflicts">
            <span class="metric-label">Conflicts</span>
            <strong id="metricConflicts">0</strong>
          </button>
          <button class="metric metric-amber" type="button" data-view="running" aria-label="Show CI in progress">
            <span class="metric-label">CI Running</span>
            <strong id="metricRunning">0</strong>
          </button>
          <button class="metric metric-blue" type="button" data-view="runningCd" aria-label="Show running CD">
            <span class="metric-label">Running CD</span>
            <strong id="metricCd">0</strong>
          </button>
          <button class="metric metric-green" type="button" data-view="finishedCd" aria-label="Show finished CD">
            <span class="metric-stack">
              <span class="metric-label">Finished CD</span>
              <span class="metric-sub metric-sub-warning" id="metricFinishedCdSub" hidden></span>
            </span>
            <strong id="metricFinishedCd">0</strong>
          </button>
          <button class="metric metric-ink" type="button" data-view="failedCd" aria-label="Show failed CD">
            <span class="metric-label">Failed CD</span>
            <strong id="metricFailedCd">0</strong>
          </button>
          <div class="metric metric-gray" aria-label="Repositories in scope">
            <span class="metric-label">Repos</span>
            <strong id="metricRepos">0</strong>
          </div>
        </section>

        <div id="loading" class="loading hidden">
          <div class="loader"></div>
          <span>Scanning GitHub&hellip;</span>
        </div>

        <section id="errorPanel" class="error-panel hidden" role="alert"></section>

        <section class="workspace">
          <nav class="rail" aria-label="Views">
            <button class="rail-item active" type="button" data-view="fail" aria-current="true">
              <span class="dot red"></span>
              Failing CI
              <strong id="navFail">0</strong>
            </button>
            <button class="rail-item" type="button" data-view="conflicts">
              <span class="dot conflict"></span>
              Conflicts
              <strong id="navConflicts">0</strong>
            </button>
            <button class="rail-item" type="button" data-view="running">
              <span class="dot amber"></span>
              CI Running
              <strong id="navRunning">0</strong>
            </button>
            <button class="rail-item" type="button" data-view="pass">
              <span class="dot green"></span>
              Passing CI
              <strong id="navPass">0</strong>
            </button>
            <button class="rail-item" type="button" data-view="noCi">
              <span class="dot gray"></span>
              No CI
              <strong id="navNoCi">0</strong>
            </button>
            <button class="rail-item" type="button" data-view="runningCd">
              <span class="dot blue"></span>
              Running CD
              <strong id="navRunningCd">0</strong>
            </button>
            <button class="rail-item" type="button" data-view="finishedCd">
              <span id="navFinishedCdDot" class="dot green"></span>
              Finished CD
              <strong id="navFinishedCd">0</strong>
            </button>
            <button class="rail-item" type="button" data-view="deployments">
              <span class="dot violet"></span>
              Deployments
              <strong id="navDeployments">0</strong>
            </button>
            <button class="rail-item" type="button" data-view="runners">
              <span class="dot gray"></span>
              Runners
              <strong id="navRunners">0</strong>
            </button>
            <button class="rail-item" type="button" data-view="failedCd">
              <span id="navFailedCdDot" class="dot ink"></span>
              Failed CD
              <strong id="navFailedCd">0</strong>
            </button>
          </nav>

          <section class="panel" aria-live="polite">
            <div class="panel-head">
              <div>
                <p id="viewKicker">Failing CI</p>
                <h2 id="viewTitle">PRs that need attention</h2>
              </div>
              <div class="filter-box">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" />
                </svg>
                <input id="filter" type="search" placeholder="Filter repo, title, author, branch&hellip;" />
                <button id="filterClear" class="filter-clear hidden" type="button" aria-label="Clear filter">×</button>
                <span id="filterCount" class="filter-count" aria-live="polite"></span>
              </div>
            </div>
            <div id="content" class="content"></div>
          </section>
        </section>
      </main>
    </div>
    <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="false"></div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
